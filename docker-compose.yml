services:
  mcp-news:
    build: ./mcp-news
    container_name: mcp-news
    expose:
      - "8000"
    networks:
      - hermes-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket; s=socket.socket(); s.connect(('localhost', 8000)); s.close()"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  hermes-agent:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    env_file: .env
    depends_on:
      mcp-news:
        condition: service_healthy
    networks:
      - hermes-net
    volumes:
      - hermes-data:/opt/data
      - ./hermes/config.yaml:/opt/data/config.yaml
      - ./hermes/skills/news-digest:/opt/data/skills/news-digest
    command: ["gateway", "run"]
    restart: unless-stopped

networks:
  hermes-net:
    driver: bridge

volumes:
  hermes-data: